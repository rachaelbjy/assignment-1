<body>

<!-- HEADER -->

<!-- MAIN CONTENT -->
<main>

    <!-- ENQUIRY FORM SECTION -->
    <section>
        <h2>Enquiry Form</h2>

        <form action="process_enquiry.php" method="post">

            <!-- PERSONAL DETAILS -->
            <fieldset>
                <legend>Personal Details</legend>

                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" maxlength="25" pattern="[A-Za-z]+" required><br>

                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" maxlength="25" pattern="[A-Za-z]+" required><br>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required><br>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0123456789" required>
            </fieldset>

            <!-- ENQUIRY DETAILS -->
            <fieldset>
                <legend>Enquiry Details</legend>

                <label for="topic">Enquiry Type:</label>
                <select id="topic" name="topic" required>
                    <option value="">Select</option>
                    <option value="succulent">Succulents</option>
                    <option value="cactus">Cactus</option>
                    <option value="pots">Pots</option>
                    <option value="accessories">Accessories</option>
                    <option value="general">General Enquiry</option>
                </select><br>

                <label for="comments">Comments:</label>
                <textarea id="comments" name="comments" rows="5" cols="40" required></textarea>
            </fieldset>

            <br>
            <input type="submit" value="Submit Enquiry">
            <input type="reset" value="Clear Form">

        </form>
    </section>


    <!-- CONTACT INFO SIDEBAR -->
    <aside>
        <h2>Contact Information</h2>
        <p>You may also contact us via WhatsApp for faster response.</p>
        <p>Our team will reply to your enquiry within 1–2 working days.</p>
    </aside>

</main>
