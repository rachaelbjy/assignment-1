<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Registration page for Cacti-Succulent Kuching">
<meta name="keywords" content="register, user, plant shop">
<meta name="author" content="YOUR NAME">
<title>Register | Cacti-Succulent Kuching</title>
<link rel="stylesheet" href="styles/register_styles.css">
</head>

<body>

<!-- HEADER -->
<!-- NAV WILL BE ADDED HERE LATER -->


<!-- MAIN CONTENT -->
<main>

    <!-- REGISTRATION FORM -->
    <section>
        <h2>Registration Form</h2>

        <form action="process_register.php" method="post">

            <!-- PERSONAL INFORMATION -->
            <fieldset>
                <legend>Personal Information</legend>

                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" maxlength="25" pattern="[A-Za-z]+" required><br>

                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" maxlength="25" pattern="[A-Za-z]+" required><br>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </fieldset>

            <!-- ADDRESS -->
            <fieldset>
                <legend>Address</legend>

                <label for="street">Street Address:</label>
                <input type="text" id="street" name="street" maxlength="40" required><br>

                <label for="city">City/Town:</label>
                <input type="text" id="city" name="city" maxlength="20" required><br>

                <label for="state">State:</label>
                <select id="state" name="state" required>
                    <option value="">Select</option>
                    <option value="Johor">Johor</option>
                    <option value="Kedah">Kedah</option>
                    <option value="Kelantan">Kelantan</option>
                    <option value="Melaka">Melaka</option>
                    <option value="Negeri Sembilan">Negeri Sembilan</option>
                    <option value="Pahang">Pahang</option>
                    <option value="Perak">Perak</option>
                    <option value="Perlis">Perlis</option>
                    <option value="Pulau Pinang">Pulau Pinang</option>
                    <option value="Sabah">Sabah</option>
                    <option value="Sarawak">Sarawak</option>
                    <option value="Selangor">Selangor</option>
                    <option value="Terengganu">Terengganu</option>
                    <option value="Kuala Lumpur">Kuala Lumpur</option>
                    <option value="Labuan">Labuan</option>
                    <option value="Putrajaya">Putrajaya</option>
                </select><br>

                <label for="postcode">Postcode:</label>
                <input type="text" id="postcode" name="postcode" pattern="[0-9]{5}" required>
            </fieldset>

            <!-- CONTACT -->
            <fieldset>
                <legend>Contact</legend>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0123456789" required>
            </fieldset>

            <br>
            <input type="submit" value="Register">
            <input type="reset" value="Clear">

        </form>
    </section>


    <!-- INFO SIDEBAR -->
    <aside>
        <h2>Why Register?</h2>
        <p>Register with us to enjoy easier ordering and faster enquiries.</p>
        <p>Stay updated with our latest plants and promotions.</p>
    </aside>

</main>

</html>
